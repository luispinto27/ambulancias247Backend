# fly.toml app configuration file generated for ambulancias247backend on 2026-07-05T18:49:26Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ambulancias247backend'
primary_region = 'dfw'

[build]
  dockerfile = 'Dockerfile'

[env]
  ASPNETCORE_ENVIRONMENT = 'Production'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
  processes = ['app']
