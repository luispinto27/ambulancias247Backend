# fly.toml app configuration file generated for ambulancias247backend on 2026-07-05T19:25:13Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ambulancias247backend'
primary_region = 'dfw'

[build]
  dockerfile = 'Dockerfile'

[env]
  ASPNETCORE_ENVIRONMENT = 'Production'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
  processes = ['app']
